name: Release

on:
  push:
    tags: ['v[0-9]*.[0-9]*.[0-9]*']

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write   # required to create GitHub Release

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npx electron-vite build

      # Build installer and publish to GitHub Releases in one step.
      # When code signing is needed, split into:
      #   1. npx electron-builder --publish never  (produces release/)
      #   2. sign release/ artifacts
      #   3. npx electron-builder --publish always --prepackaged release/
      # and recompute SHA512 in latest.yml after signing.
      - name: Package and Publish
        run: npx electron-builder --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
